name: Scrape RTO docs

on:
  schedule:
    # Daily scrape: 11:00 UTC (~6 AM ET standard / 7 AM ET DST). Daily
    # cadence catches late-added meetings (especially CAISO) within a day,
    # which matters now that meetings can fire "Initiative-linked" tags
    # via the cross-reference scraper. Screening is gated on
    # meeting_screened_at IS NULL / ai_processed_at IS NULL so we only
    # spend Claude API on newly-discovered items.
    - cron: '0 11 * * *'
  workflow_dispatch:        # manual run from the Actions tab

permissions:
  contents: write           # so the job can commit DB + JSON back

concurrency:
  group: scrape
  cancel-in-progress: false # never interrupt an in-flight scrape

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Scrape (download PDFs + extract text into DB)
        working-directory: rto-docs
        run: python run_scrapers.py --lookback 16 --lookahead 16

      - name: Screen meetings + documents (Claude)
        working-directory: rto-docs
        run: python screen_documents.py

      - name: Re-export calendar JSON
        working-directory: rto-docs
        run: python run_scrapers.py --export-only

      - name: Commit DB + JSON if changed
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add rto-docs/db/rto_documents.db rto-docs/rto_events_with_docs.json rto-docs/rto_issues.json rto-docs/rto_hydro_corpus.json rto-docs/rto_hydro_corpus.csv
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Scrape: $(date -u +%Y-%m-%d) [skip ci]"
            git push
          fi

      - name: Upload run log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-failure-logs
          path: rto-docs/logs/
          if-no-files-found: ignore
          retention-days: 14
